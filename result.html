<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Learning Game - Result</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/result.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <main class="result-card">
            <header class="result-header">
                <div class="trophy-container">
                    <i class="fa-solid fa-trophy trophy-icon"></i>
                </div>
                <h1>ยินดีด้วย! คุณเรียนรู้จบการทดสอบแล้ว</h1>
                <p class="result-date" id="completion-date">เสร็จสิ้นเมื่อ: --/--/----</p>
            </header>

            <section class="score-section">
                <div class="score-circle">
                    <div class="score-number-box">
                        <span id="final-score">0</span>
                        <span class="score-total">/10</span>
                    </div>
                </div>
                <h3 id="performance-feedback" class="feedback-text">ยอดเยี่ยม! คุณเข้าใจโครงสร้างร่างกายเป็นอย่างดี</h3>
            </section>

            <section class="summary-details">
                <div class="detail-row">
                    <span><i class="fa-regular fa-circle-check text-success"></i> ตอบถูก</span>
                    <strong id="correct-count">0 ข้อ</strong>
                </div>
                <div class="detail-row">
                    <span><i class="fa-regular fa-circle-xmark text-danger"></i> ตอบผิด</span>
                    <strong id="incorrect-count">0 ข้อ</strong>
                </div>
            </section>

            <footer class="result-actions">
                <a href="game.html" class="btn btn-primary">
                    <i class="fa-solid fa-rotate-right"></i> เล่นอีกครั้ง
                </a>
                <a href="dashboard.html" class="btn btn-secondary">
                    <i class="fa-solid fa-chart-line"></i> ไปยังคลังแดชบอร์ด
                </a>
            </footer>
        </main>
    </div>

    <script type="module" src="js/result.js"></script>
</body>
</html>
